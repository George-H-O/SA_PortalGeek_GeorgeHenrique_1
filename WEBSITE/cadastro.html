<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Cadastro - Geek Universe 2026</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>

        <h1>🎮 Geek Universe 2026</h1>

        <nav>
            <a href="index.html">Início</a>
            <a href="atracoes.html">Atrações</a>
            <a href="cronograma.html">Cronograma</a>
            <a href="cadastro.html">Pré-Cadastro</a>
        </nav>

    </header>

    <main>

        <h2 class="titulo-pagina">Pré-Cadastro</h2>

        <form id="formCadastro">

            <input
                type="text"
                placeholder="Digite seu nome"
                required>

            <input
                type="email"
                placeholder="Digite seu e-mail"
                required>

            <input
                type="text"
                placeholder="Digite sua cidade"
                required>

            <select required>

                <option value="">
                    Selecione a faixa etária
                </option>

                <option>Até 17 anos</option>
                <option>18 a 30 anos</option>
                <option>31 a 50 anos</option>
                <option>Acima de 50 anos</option>

            </select>

            <select required>

                <option value="">
                    Evento de interesse
                </option>

                <option>Concurso Cosplay</option>
                <option>Arena Gamer</option>
                <option>Painel Anime</option>
                <option>Workshop de Robótica</option>
                <option>Realidade Virtual</option>

            </select>

            <button type="submit">
                <i class="fa-solid fa-paper-plane"></i>
                Enviar Pré-Cadastro
            </button>

        </form>

    </main>

    <footer>
        <p>© 2026 - Geek Universe | Desenvolvido por George Henrique</p>
    </footer>

    <script src="js/script.js"></script>

</body>

</html>
